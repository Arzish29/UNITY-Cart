name: unity_cart
description: A multi-community e-commerce platform — Every Community. One Cart.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  lottie: ^3.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  path_provider: ^2.1.2
  carousel_slider: ^5.1.2
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
 
 
